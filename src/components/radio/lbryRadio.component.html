<label [ngClass]="{ disabled: disabled }" class="container"
  >{{ label }}
  <input
    type="radio"
    [id]="id"
    [name]="name"
    [value]="value"
    [checked]="checked"
    [disabled]="disabled"
    [(ngModel)]="blModel"
    (ngModelChange)="change($event)"
  />
  <span id="radio" [ngClass]="{ disabled: disabled }" class="checkmark"></span>
</label>
