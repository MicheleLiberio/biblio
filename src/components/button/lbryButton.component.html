<button id={{id}} [ngClass]="{'btn_disabled': disabled === true, 
                'btn_first': disabled === false && style === 'first',
                'btn_second': style === 'second',
                'btn_third': style === 'third',
                'btn_loading': (isLoading$ | async)
                }" [ngStyle]="{'pointer-events': (isLoading$ | async) ? 'none' : ''}"
    (click)="click()" [disabled]="disabled">
    <span *ngIf="!(isLoading$ | async)">{{title}}<span *ngIf="icon" [ngClass]="icon ? icon : ''" class="icona"></span></span> 
    <span *ngIf="(isLoading$ | async)" class="loading"></span>
