<div class="row">
  <div class="col-md-12">
    <label>{{label}}</label>
  </div>
</div>
<div class="row">
  <div class="col-md-10">
    <input #idForm="ngModel" type="email" class="form-control inp" [disabled]="disabled" placeholder="{{placeholder}}"
      [required]="required" [(ngModel)]="sharedVar" (ngModelChange)="change($event)">
    <span *ngIf="sharedVar" class="cancel" (click)="cancel(idForm)">
      <i class="bi bi-x-lg"></i>
    </span>
  </div>
  <span *ngIf="required">
    <span [ngClass]="{'icon_invalid': idForm.invalid, 'icon_valid' : idForm.valid}">
      <span *ngIf="false">
        <i [ngClass]="{'bi bi-exclamation': idForm.invalid, 'bi bi-check': idForm.valid}" data-toggle="tooltip"
          data-placement="top" title="{{idForm.invalid ? tooltipTitleInvalid : tooltipTitleValid}}">
        </i>
        <!-- <script>
          $(document).ready(function () {
            $('[data-toggle="tooltip"]').tooltip();
          });
        </script> -->
      </span>
      <app-tooltip
        [messageTool]= "tooltipTitleInvalid"
        [icon]="'bi bi-exclamation'"
      ></app-tooltip>
    </span>
  </span>
</div>
