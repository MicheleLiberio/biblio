<div class="container mb-4">
  <div class="row headerAccordion">
    <div class="col-11 align-self-center title">
      {{ title }}
    </div>
    <div class="col-1 align-self-center icon">
      <span *ngIf="!isCollapsed" (click)="collapse()"
        ><i class="bi bi-chevron-down"></i
      ></span>
      <span *ngIf="isCollapsed" (click)="collapse()"
        ><i class="bi bi-chevron-up"></i
      ></span>
    </div>
  </div>
  <div *ngIf="isCollapsed" class="row collapse_sty">
    <ng-content></ng-content>
  </div>
</div>
