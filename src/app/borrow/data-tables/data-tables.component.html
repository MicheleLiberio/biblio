<div style="padding-left: 100px; padding-right: 100px">
  <lbry-section [title]="'Dati libro'">
    <div class="container">
      <form
        novalidate
        #bookForm="ngForm"
        (ngSubmit)="submitForm(form)"
        style="margin-left: 20px; margin-right: 20px; margin-top: 10px"
      >
        <div class="row">
          <div class="col-12">
            <div class="m-3">
              <lbry-input
                [id]="'Titolo'"
                [value]="'Titolo'"
                [label]="'Titolo'"
                [disabled]="true"
                [(blModel)]="bookChosen.title"
                [required]="false"
              ></lbry-input>
            </div>
          </div>
          <!-- </div> -->
          <!-- <div class="row"> -->
          <div class="col-12">
            <div class="m-3">
              <lbry-input
                [id]="'Autore'"
                [value]="'Autore'"
                [label]="'Autore/i'"
                [disabled]="true"
                [(blModel)]="authors"
                [required]="false"
              ></lbry-input>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-2">
            <div class="m-3">
              <lbry-input
                [id]="'isbn'"
                [value]="'isbn'"
                [label]="'ISBN'"
                [disabled]="true"
                [(blModel)]="bookChosen.isbn"
                [required]="false"
              ></lbry-input>
            </div>
          </div>
          <div class="col-2">
            <div class="m-3">
              <lbry-input
                [id]="'copia'"
                [value]="'copia'"
                [label]="'Copia'"
                [disabled]="true"
                [(blModel)]="bookChosen.copia"
                [required]="false"
              ></lbry-input>
            </div>
          </div>
          <div class="col-2"></div>
          <div class="col-3">
            <div class="m-3" style="float: right">
              <lbry-calendar
                [id]="'DataPrestito'"
                [label]="'Data del prestito'"
                [placeholder]="'gg/mm/aaaa'"
                [disabled]="false"
                [(blModel)]="bookChosen.dateBorrow"
                (blModelChange)="getDateBorrow($event)"
                [required]="true"
              ></lbry-calendar>
            </div>
          </div>
          <div class="col-3">
            <div class="m-3" style="float: right">
              <lbry-calendar
                [id]="'DataRestituzione'"
                [label]="'Data della restituzione'"
                [placeholder]="'gg/mm/aaaa'"
                [disabled]="false"
                [(blModel)]="bookChosen.dateRestitution"
                [required]="true"
              ></lbry-calendar>
            </div>
          </div>
        </div>
        <!-- <div class="row my-3">
          <div class="col">
            <lbry-button
              [title]="'Annulla'"
              [style]="styleButton.second"
              [disabled]="false"
            ></lbry-button>
          </div>
          <div class="col text-end">
            <lbry-button
              type="submit"
              [title]="'Ricerca'"
              [disabled]="!control()"
            ></lbry-button>
          </div>
        </div> -->
      </form>
    </div>
  </lbry-section>
  <lbry-section [title]="'Dati utente'">
    <div class="container">
      <form
        novalidate
        #userForm="ngForm"
        (ngSubmit)="submitForm(form)"
        style="margin-left: 20px; margin-right: 20px; margin-top: 10px"
      >
        <div class="row">
          <div class="col-6">
            <div class="m-3">
              <lbry-input
                [id]="'Nome'"
                [value]="'Nome'"
                [label]="'Nome'"
                [(blModel)]="user.name"
                [required]="true"
              ></lbry-input>
            </div>
          </div>
          <div class="col-6">
            <div class="m-3">
              <lbry-input
                [id]="'Cognome'"
                [value]="'Cognome'"
                [label]="'Cognome'"
                [(blModel)]="user.surname"
                [required]="true"
              ></lbry-input>
            </div>
          </div>
          <div class="col-4">
            <div class="m-3">
              <lbry-input
                [id]="'Indirizzo'"
                [value]="'Indirizzo'"
                [label]="'Indirizzo'"
                [(blModel)]="user.address"
                [required]="true"
              ></lbry-input>
            </div>
          </div>
          <div class="col-4">
            <div class="m-3">
              <lbry-input
                [id]="'Città'"
                [value]="'Città'"
                [label]="'Città'"
                [(blModel)]="user.town"
                [required]="true"
              ></lbry-input>
            </div>
          </div>
          <div class="col-4">
            <div class="m-3">
              <lbry-input
                [id]="'Cap'"
                [value]="'Cap'"
                [label]="'Cap'"
                [(blModel)]="user.zip"
                [required]="true"
              ></lbry-input>
            </div>
          </div>
          <div class="col-4">
            <div class="m-3">
              <lbry-input
                [id]="'Telefono'"
                [value]="'Telefono'"
                [label]="'Telefono'"
                [(blModel)]="user.telephone"
                [pattern]="patternInput.NUMCELL || patternInput.NUMFISSO"
                [required]="false"
              ></lbry-input>
            </div>
          </div>
          <div class="col-4">
            <div class="m-3">
              <lbry-input
                [id]="'E-mail'"
                [value]="'E-mail'"
                [label]="'E-mail'"
                [(blModel)]="user.email"
                [required]="false"
                [pattern]="patternInput.MAIL"
              ></lbry-input>
            </div>
          </div>
        </div>
      </form>
    </div>
  </lbry-section>
</div>

<div class="row mt-5 mb-4">
  <div class="col-6">
    <lbry-button
      [style]="styleButton.first"
      [title]="'Indietro'"
      [disabled]="false"
      (nbpClick)="goBack()"
    ></lbry-button>
  </div>
  <div class="col-6" style="text-align: right">
    <lbry-button
      [style]="styleButton.first"
      [title]="'Prosegui'"
      [disabled]="check()"
      (nbpClick)="goForward()"
    ></lbry-button>
  </div>
</div>
